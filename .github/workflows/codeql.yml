name: "CodeQL Analysis and Security Scan"
on:
  push:
    branches: ["main", "master"]
  pull_request_target:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CODEQL_DISABLE_TELEMETRY: true

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Setup Go cache (optional)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Ensure Go modules (non-failing)
        if: always()
        run: |
          if [ -f go.mod ]; then
            go mod tidy || true
            go mod download || true
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ['go', 'javascript-typescript', 'python']
          tools: linked
          setup:
            cli-version: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Autobuild (CodeQL)
        uses: github/codeql-action/autobuild@v3

      - name: Build (custom example for Go)
        if: always()
        run: |
          if [ -f go.mod ]; then
            go build ./... || true
          fi

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: results
          upload: always
          add-snippets: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CodeQL results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results-${{ github.run_id }}
          path: ./results

      - name: Upload CodeQL logs (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-logs-${{ github.run_id }}
          path: |
            ${{ github.workspace }}/codeql*
            ${{ github.workspace }}/.github/codeql
            ./results
