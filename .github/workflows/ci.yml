name: NebulaCore CI (Clean & Stable)

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.20"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  setup:
    name: Detect Project Layout
    runs-on: ubuntu-latest
    outputs:
      has_go: ${{ steps.detect.outputs.has_go }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_web: ${{ steps.detect.outputs.has_web }}
      node_dir: ${{ steps.detect.outputs.node_dir }}
      pkg_lock: ${{ steps.detect.outputs.pkg_lock }}
      go_mod_paths: ${{ steps.detect.outputs.go_mod_paths }}
      go_mod_paths_json: ${{ steps.detect.outputs.go_mod_paths_json }}
      has_go_sum: ${{ steps.detect.outputs.has_go_sum }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: detect
        name: Detect languages and important files (recursive)
        run: |
          set -euo pipefail
          # defaults
          echo "has_go=false" >> $GITHUB_OUTPUT
          echo "has_python=false" >> $GITHUB_OUTPUT
          echo "has_node=false" >> $GITHUB_OUTPUT
          echo "has_web=false" >> $GITHUB_OUTPUT
          echo "node_dir=." >> $GITHUB_OUTPUT
          echo "pkg_lock=" >> $GITHUB_OUTPUT
          echo "go_mod_paths=" >> $GITHUB_OUTPUT
          echo "go_mod_paths_json=[]" >> $GITHUB_OUTPUT
          echo "has_go_sum=false" >> $GITHUB_OUTPUT

          # Node / frontend detection (first match)
          pkg_json=$(find . -type f -name 'package.json' -not -path "./.git/*" -print -quit || true)
          if [ -n "$pkg_json" ]; then
            dir=$(dirname "$pkg_json")
            dir="${dir#./}"
            if [ -z "$dir" ]; then dir="."; fi
            echo "has_node=true" >> $GITHUB_OUTPUT
            echo "node_dir=$dir" >> $GITHUB_OUTPUT
          fi

          # lockfile detection (global)
          lock=$(find . -type f \( -name 'package-lock.json' -o -name 'yarn.lock' -o -name 'npm-shrinkwrap.json' \) -not -path "./.git/*" -print -quit || true)
          if [ -n "$lock" ]; then
            lock="${lock#./}"
            echo "pkg_lock=$lock" >> $GITHUB_OUTPUT
          fi

          # Python detection
          pyreq=$(find . -type f -name 'requirements.txt' -not -path "./.git/*" -print -quit || true)
          pyproj=$(find . -type f -name 'pyproject.toml' -not -path "./.git/*" -print -quit || true)
          if [ -n "$pyreq" ] || [ -n "$pyproj" ]; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          fi

          # web/ special-case
          if [ -d "web" ] || [ -f "web/package.json" ]; then
            echo "has_web=true" >> $GITHUB_OUTPUT
            if [ -z "${pkg_json:-}" ]; then
              echo "node_dir=web" >> $GITHUB_OUTPUT
            fi
          fi

          # Go modules (collect all go.mod paths)
          mapfile -t mods < <(find . -type f -name 'go.mod' -not -path "./.git/*" -print || true)
          if [ "${#mods[@]}" -gt 0 ]; then
            echo "has_go=true" >> $GITHUB_OUTPUT
            dirs=""
            json="["
            first=true
            any_sum=false
            for m in "${mods[@]}"; do
              d=$(dirname "$m")
              d="${d#./}"
              if [ -z "$d" ]; then d="."; fi
              dirs="${dirs} ${d}"
              if [ "$first" = true ]; then
                json="${json}\"${d}\""
                first=false
              else
                json="${json},\"${d}\""
              fi
              if [ -f "${d}/go.sum" ] || ( [ "$d" = "." ] && [ -f "go.sum" ] ); then
                any_sum=true
              fi
            done
            json="${json}]"
            dirs="${dirs#"${dirs%%[! ]*}"}"
            echo "go_mod_paths=$dirs" >> $GITHUB_OUTPUT
            echo "go_mod_paths_json=$json" >> $GITHUB_OUTPUT
            if [ "$any_sum" = true ]; then
              echo "has_go_sum=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-go:
    name: Build & Test Go
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_go == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git to access private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadof "https://github.com/"
          go env -w GOPRIVATE=github.com/Aurionex/*

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ---------------------------
      # Lightweight AST-based fixer step (minimal & safe)
      # ---------------------------
      - name: Run safe Go import fixer (lightweight)
        run: |
          set -euo pipefail
          echo "[*] Running lightweight import fixer..."
          mkdir -p tools
          cat > tools/fiximports.go <<'EOF'
          package main
          import (
            "bytes"
            "fmt"
            "go/parser"
            "go/token"
            "go/printer"
            "io/fs"
            "os"
            "path/filepath"
            "strings"
            "go/ast"
            "os/exec"
            "golang.org/x/tools/imports"
          )
          const fallback = "github.com/Aurionex/NebulaCore"
          const oldTok = "konrotaharai-netizen"
          
          func main() {
            files := []string{}
            filepath.WalkDir(".", func(p string, d fs.DirEntry, err error) error {
              if err != nil { return nil }
              if d.IsDir() {
                if d.Name() == ".git" || d.Name() == "vendor" || d.Name() == "node_modules" { return filepath.SkipDir }
                return nil
              }
              if strings.HasSuffix(p, ".go") { files = append(files, p) }
              return nil
            })
            for _, fpath := range files {
              src, err := os.ReadFile(fpath)
              if err != nil { continue }
              fset := token.NewFileSet()
              file, err := parser.ParseFile(fset, fpath, src, parser.ParseComments)
              if err != nil { fmt.Fprintf(os.Stderr, "parse %s: %v\n", fpath, err); continue }
              modPath, modDir := findMod(filepath.Dir(fpath))
              changed := false
              for _, imp := range file.Imports {
                old := strings.Trim(imp.Path.Value, "\"")
                if old == "" { continue }
                if strings.HasPrefix(old, "internal/") {
                  new := modPath + "/" + old
                  if old != new { imp.Path.Value = "\"" + new + "\""; changed = true }
                  if !exists(modDir, strings.TrimPrefix(old, "internal/")) { fmt.Printf("WARN: %s import %s -> %s : not found\n", fpath, old, new) }
                  continue
                }
                if strings.Contains(old, oldTok) {
                  new := strings.Replace(old, oldTok, modPath, 1)
                  if old != new { imp.Path.Value = "\"" + new + "\""; changed = true }
                  continue
                }
                if !strings.Contains(old, ".") && !strings.Contains(old, "/") {
                  new := modPath + "/" + old
                  if old != new { imp.Path.Value = "\"" + new + "\""; changed = true }
                  if !exists(modDir, old) { fmt.Printf("WARN: %s converted %s -> %s but folder missing\n", fpath, old, new) }
                  continue
                }
              }
              var outBytes []byte
              if changed {
                var buf bytes.Buffer
                printer.Fprint(&buf, fset, file)
                processed, err := imports.Process(fpath, buf.Bytes(), &imports.Options{Comments: true})
                if err == nil { outBytes = processed } else { outBytes = buf.Bytes() }
              } else {
                processed, err := imports.Process(fpath, src, &imports.Options{Comments: true})
                if err == nil && !bytes.Equal(processed, src) { outBytes = processed }
              }
              if outBytes != nil {
                _ = os.WriteFile(fpath, outBytes, 0644)
                fmt.Printf("updated: %s\n", fpath)
              }
            }
            exec.Command("bash", "-lc", "go mod tidy").Run()
            fmt.Println("[fixer] done")
          }
          
          func findMod(dir string) (string, string) {
            cur := dir
            for {
              m := filepath.Join(cur, "go.mod")
              if _, err := os.Stat(m); err == nil {
                b, _ := os.ReadFile(m)
                for _, line := range strings.Split(string(b), "\n") {
                  line = strings.TrimSpace(line)
                  if strings.HasPrefix(line, "module ") {
                    parts := strings.Fields(line)
                    if len(parts) >= 2 { return parts[1], cur }
                  }
                }
                return fallback, cur
              }
              p := filepath.Dir(cur)
              if p == cur { break }
              cur = p
            }
            return fallback, "."
          }
          
          func exists(modDir, rel string) bool {
            cand := filepath.Join(modDir, filepath.FromSlash(rel))
            if info, err := os.Stat(cand); err == nil && info.IsDir() { return true }
            if matches, err := filepath.Glob(filepath.Join(cand, "*.go")); err == nil && len(matches) > 0 { return true }
            return false
          }
          EOF
          GOFLAGS="" go run ./tools/fiximports.go || echo "[!] fiximports failed (check logs)"
          echo "[*] Fixer finished (runner copy only; no commit/push performed)."
      # ---------------------------
      # End lightweight fixer step
      # ---------------------------

      - name: Install jq and build modules
        run: |
          set -euo pipefail
          printf '%s' "${{ needs.setup.outputs.go_mod_paths_json }}" > /tmp/go_mods.json
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi

          mapfile -t mods < <(jq -r '.[]' /tmp/go_mods.json 2>/dev/null || true)
          if [ "${#mods[@]}" -eq 0 ]; then
            mods=(".")
          fi

          echo "Detected Go modules: ${mods[*]}"
          for d in "${mods[@]}"; do
            if [ -z "$d" ] || [ "$d" = "." ]; then d="."; fi
            echo ">>> Processing Go module: '$d'"
            cd "$d"
            go mod tidy
            go mod download
            go test ./... -v

            if [ -d "cmd" ]; then
              echo "Found cmd/ directory; building each sub-binary separately..."
              mkdir -p ./build/bin
              for binpath in cmd/*; do
                if [ -d "$binpath" ]; then
                  name=$(basename "$binpath")
                  if compgen -G "$binpath/*.go" > /dev/null; then
                    echo "Building binary: $name (module: $d)"
                    out="./build/bin/${d//\//_}-${name}"
                    go build -v -o "$out" ./cmd/"$name"
                    echo "-> wrote $out"
                  fi
                fi
              done
            else
              echo "No cmd/ found; falling back to module-wide build"
              go build ./...
            fi

            cd - >/dev/null
          done

  lint-python:
    name: Lint & Security (Python)
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_python == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Lint & Bandit
        run: |
          set -euo pipefail
          pip install --upgrade pip
          pip install flake8 bandit || true
          flake8 .
          bandit -r .

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_node == 'true' || needs.setup.outputs.has_web == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (with cache)
        if: ${{ needs.setup.outputs.pkg_lock != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ needs.setup.outputs.node_dir }}/package-lock.json

      - name: Setup Node (no cache)
        if: ${{ needs.setup.outputs.pkg_lock == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend deps and build
        run: |
          set -euo pipefail
          dir="${{ needs.setup.outputs.node_dir }}"
          if [ -z "$dir" ] || [ "$dir" = "." ]; then dir="."; fi
          echo "Using frontend dir: $dir"
          cd "$dir"
          if [ -f package-lock.json ] || [ -f yarn.lock ] || [ -f npm-shrinkwrap.json ]; then
            echo "Running install with lockfile present"
            npm ci --no-audit --no-fund
          else
            echo "Running install without lockfile"
            npm install --no-audit --no-fund
          fi
          npm run build --if-present
          npm test --if-present || echo "No tests found."

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "go, python, javascript"

      - name: Prepare Go build for CodeQL
        if: ${{ needs.setup.outputs.has_go == 'true' }}
        run: |
          set -euo pipefail
          printf '%s' "${{ needs.setup.outputs.go_mod_paths_json }}" > /tmp/go_mods.json
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi
          mapfile -t mods < <(jq -r '.[]' /tmp/go_mods.json 2>/dev/null || true)
          if [ "${#mods[@]}" -eq 0 ]; then
            mods=(".")
          fi
          echo "Preparing CodeQL build for modules: ${mods[*]}"
          for d in "${mods[@]}"; do
            if [ -z "$d" ] || [ "$d" = "." ]; then d="."; fi
            echo "-> $d"
            cd "$d"
            go env
            go mod tidy
            go mod download
            go test ./... -v || echo "Some tests failed but continuing CodeQL prep"
            
            if [ -d "cmd" ]; then
              mkdir -p ./codeql_build/bin
              for binpath in cmd/*; do
                if [ -d "$binpath" ]; then
                  name=$(basename "$binpath")
                  if compgen -G "$binpath/*.go" > /dev/null; then
                    out="./codeql_build/bin/${d//\//_}-${name}"
                    echo "CodeQL build: $out"
                    go build -v -o "$out" ./cmd/"$name"
                    echo "-> $out"
                  fi
                fi
              done
            else
              go build ./...
            fi
            
            cd - >/dev/null
          done

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          upload: "false"

  summary:
    name: Summary Report
    runs-on: ubuntu-latest
    needs: setup
    if: always()
    steps:
      - name: Print basic CI summary
        run: |
          echo "✅ CI completed for $GITHUB_REPOSITORY"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Detected: has_go=${{ needs.setup.outputs.has_go }}, has_go_sum=${{ needs.setup.outputs.has_go_sum }}, has_node=${{ needs.setup.outputs.has_node }}, node_dir=${{ needs.setup.outputs.node_dir }}, pkg_lock=${{ needs.setup.outputs.pkg_lock }}"
      
      - name: Upload summary to GitHub Steps Summary
        run: |
          echo "### ✅ CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Go detected: ${{ needs.setup.outputs.has_go }}" >> $GITHUB_STEP_SUMMARY
          echo "- Go sum present: ${{ needs.setup.outputs.has_go_sum }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node detected: ${{ needs.setup.outputs.has_node }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node dir: ${{ needs.setup.outputs.node_dir }}" >> $GITHUB_STEP_SUMMARY
          echo "- Package lock path: ${{ needs.setup.outputs.pkg_lock }}" >> $GITHUB_STEP_SUMMARY
