name: NebulaCore CI (Clean & Stable)

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.20"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  setup:
    name: Detect Project Layout
    runs-on: ubuntu-latest
    outputs:
      has_go: ${{ steps.detect.outputs.has_go }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_web: ${{ steps.detect.outputs.has_web }}
      node_dir: ${{ steps.detect.outputs.node_dir }}
      pkg_lock: ${{ steps.detect.outputs.pkg_lock }}
      go_mod_paths: ${{ steps.detect.outputs.go_mod_paths }}
      go_mod_paths_json: ${{ steps.detect.outputs.go_mod_paths_json }}
      has_go_sum: ${{ steps.detect.outputs.has_go_sum }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: detect
        name: Detect languages and important files (recursive)
        run: |
          set -euo pipefail
          # defaults
          echo "has_go=false" >> $GITHUB_OUTPUT
          echo "has_python=false" >> $GITHUB_OUTPUT
          echo "has_node=false" >> $GITHUB_OUTPUT
          echo "has_web=false" >> $GITHUB_OUTPUT
          echo "node_dir=." >> $GITHUB_OUTPUT
          echo "pkg_lock=" >> $GITHUB_OUTPUT
          echo "go_mod_paths=" >> $GITHUB_OUTPUT
          echo "go_mod_paths_json=[]" >> $GITHUB_OUTPUT
          echo "has_go_sum=false" >> $GITHUB_OUTPUT

          # Node / frontend detection
          pkg_json=$(find . -type f -name 'package.json' -not -path "./.git/*" -print -quit || true)
          if [ -n "$pkg_json" ]; then
            dir=$(dirname "$pkg_json")
            dir="${dir#./}"
            [ -z "$dir" ] && dir="."
            echo "has_node=true" >> $GITHUB_OUTPUT
            echo "node_dir=$dir" >> $GITHUB_OUTPUT
          fi

          # lockfile detection
          lock=$(find . -type f \( -name 'package-lock.json' -o -name 'yarn.lock' -o -name 'npm-shrinkwrap.json' \) -not -path "./.git/*" -print -quit || true)
          [ -n "$lock" ] && echo "pkg_lock=${lock#./}" >> $GITHUB_OUTPUT

          # Python detection
          pyreq=$(find . -type f -name 'requirements.txt' -not -path "./.git/*" -print -quit || true)
          pyproj=$(find . -type f -name 'pyproject.toml' -not -path "./.git/*" -print -quit || true)
          if [ -n "$pyreq" ] || [ -n "$pyproj" ]; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          fi

          # web special-case
          if [ -d "web" ] || [ -f "web/package.json" ]; then
            echo "has_web=true" >> $GITHUB_OUTPUT
            [ -z "${pkg_json:-}" ] && echo "node_dir=web" >> $GITHUB_OUTPUT
          fi

          # Go modules
          mapfile -t mods < <(find . -type f -name 'go.mod' -not -path "./.git/*" -print || true)
          if [ "${#mods[@]}" -gt 0 ]; then
            echo "has_go=true" >> $GITHUB_OUTPUT
            dirs=""
            json="["
            first=true
            any_sum=false
            for m in "${mods[@]}"; do
              d=$(dirname "$m")
              d="${d#./}"
              [ -z "$d" ] && d="."
              dirs="${dirs} ${d}"
              if $first; then json="${json}\"${d}\""; first=false; else json="${json},\"${d}\""; fi
              [ -f "${d}/go.sum" ] || ([ "$d" = "." ] && [ -f "go.sum" ]) && any_sum=true
            done
            json="${json}]"
            dirs="${dirs#"${dirs%%[! ]*}"}"
            echo "go_mod_paths=$dirs" >> $GITHUB_OUTPUT
            echo "go_mod_paths_json=$json" >> $GITHUB_OUTPUT
            [ "$any_sum" = true ] && echo "has_go_sum=true" >> $GITHUB_OUTPUT
          fi

  build-go:
    name: Build & Test Go
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_go == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git for private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadof "https://github.com/"
          go env -w GOPRIVATE=github.com/Aurionex/*

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run safe Go import fixer
        run: |
          GOFLAGS="" go run ./tools/fiximports.go || echo "[!] fiximports failed"

      - name: Build & Test all Go modules safely
        run: |
          set -euo pipefail
          printf '%s' "${{ needs.setup.outputs.go_mod_paths_json }}" > /tmp/go_mods.json
          mapfile -t mods < <(jq -r '.[]' /tmp/go_mods.json || true)
          [ "${#mods[@]}" -eq 0 ] && mods=(".")
          echo "Detected Go modules: ${mods[*]}"
          for d in "${mods[@]}"; do
            cd "$d"
            export GOMOD=$(pwd)/go.mod
            go mod tidy
            go mod download
            go test ./... -v
            if [ -d "cmd" ]; then
              mkdir -p ./build/bin
              for binpath in cmd/*; do
                [ -d "$binpath" ] || continue
                [ -n "$(ls $binpath/*.go 2>/dev/null)" ] || continue
                out="./build/bin/${d//\//_}-$(basename $binpath)"
                go build -mod=mod -o "$out" ./cmd/"$(basename $binpath)"
              done
            else
              go build -mod=mod ./...
            fi
            cd - >/dev/null
          done

  lint-python:
    name: Lint & Security (Python)
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_python == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Lint & Bandit
        run: |
          pip install --upgrade pip
          pip install flake8 bandit || true
          flake8 .
          bandit -r .

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_node == 'true' || needs.setup.outputs.has_web == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ needs.setup.outputs.node_dir }}/package-lock.json
      - run: |
          dir="${{ needs.setup.outputs.node_dir }}"
          [ -z "$dir" ] && dir="."
          cd "$dir"
          if [ -f package-lock.json ] || [ -f yarn.lock ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
          npm run build --if-present
          npm test --if-present || echo "No tests found."

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: "go, python, javascript"
      - name: Prepare Go build for CodeQL
        if: ${{ needs.setup.outputs.has_go == 'true' }}
        run: |
          printf '%s' "${{ needs.setup.outputs.go_mod_paths_json }}" > /tmp/go_mods.json
          mapfile -t mods < <(jq -r '.[]' /tmp/go_mods.json || true)
          [ "${#mods[@]}" -eq 0 ] && mods=(".")
          for d in "${mods[@]}"; do
            cd "$d"
            export GOMOD=$(pwd)/go.mod
            go mod tidy
            go mod download
            go test ./... -v || echo "Some tests failed"
            if [ -d "cmd" ]; then
              mkdir -p ./codeql_build/bin
              for binpath in cmd/*; do
                [ -d "$binpath" ] || continue
                [ -n "$(ls $binpath/*.go 2>/dev/null)" ] || continue
                out="./codeql_build/bin/${d//\//_}-$(basename $binpath)"
                go build -mod=mod -o "$out" ./cmd/"$(basename $binpath)"
              done
            else
              go build -mod=mod ./...
            fi
            cd - >/dev/null
          done
      - uses: github/codeql-action/analyze@v3
        with:
          upload: "false"

  summary:
    name: Summary Report
    runs-on: ubuntu-latest
    needs: setup
    if: always()
    steps:
      - run: |
          echo "✅ CI completed for $GITHUB_REPOSITORY"
          echo "Detected: has_go=${{ needs.setup.outputs.has_go }}, has_go_sum=${{ needs.setup.outputs.has_go_sum }}, has_node=${{ needs.setup.outputs.has_node }}, node_dir=${{ needs.setup.outputs.node_dir }}, pkg_lock=${{ needs.setup.outputs.pkg_lock }}"
      - run: |
          echo "### ✅ CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Go detected: ${{ needs.setup.outputs.has_go }}" >> $GITHUB_STEP_SUMMARY
          echo "- Go sum present: ${{ needs.setup.outputs.has_go_sum }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node detected: ${{ needs.setup.outputs.has_node }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node dir: ${{ needs.setup.outputs.node_dir }}" >> $GITHUB_STEP_SUMMARY
          echo "- Package lock path: ${{ needs.setup.outputs.pkg_lock }}" >> $GITHUB_STEP_SUMMARY
