name: NebulaCore CI (Clean & Stable)

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.20"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  setup:
    name: Detect Project Layout
    runs-on: ubuntu-latest
    outputs:
      has_go: ${{ steps.detect.outputs.has_go }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_web: ${{ steps.detect.outputs.has_web }}
      node_dir: ${{ steps.detect.outputs.node_dir }}
      pkg_lock: ${{ steps.detect.outputs.pkg_lock }}
      go_mod_paths: ${{ steps.detect.outputs.go_mod_paths }}
      go_mod_paths_json: ${{ steps.detect.outputs.go_mod_paths_json }}
      has_go_sum: ${{ steps.detect.outputs.has_go_sum }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: detect
        name: Detect languages and important files (recursive)
        run: |
          set -euo pipefail
          # defaults
          echo "has_go=false" >> $GITHUB_OUTPUT
          echo "has_python=false" >> $GITHUB_OUTPUT
          echo "has_node=false" >> $GITHUB_OUTPUT
          echo "has_web=false" >> $GITHUB_OUTPUT
          echo "node_dir=." >> $GITHUB_OUTPUT
          echo "pkg_lock=" >> $GITHUB_OUTPUT
          echo "go_mod_paths=" >> $GITHUB_OUTPUT
          echo "go_mod_paths_json=[]" >> $GITHUB_OUTPUT
          echo "has_go_sum=false" >> $GITHUB_OUTPUT

          # Node / frontend detection (first match)
          pkg_json=$(find . -type f -name 'package.json' -not -path "./.git/*" -print -quit || true)
          if [ -n "$pkg_json" ]; then
            dir=$(dirname "$pkg_json")
            dir="${dir#./}"
            if [ -z "$dir" ]; then dir="."; fi
            echo "has_node=true" >> $GITHUB_OUTPUT
            echo "node_dir=$dir" >> $GITHUB_OUTPUT
          fi

          # lockfile detection (global)
          lock=$(find . -type f \( -name 'package-lock.json' -o -name 'yarn.lock' -o -name 'npm-shrinkwrap.json' \) -not -path "./.git/*" -print -quit || true)
          if [ -n "$lock" ]; then
            lock="${lock#./}"
            echo "pkg_lock=$lock" >> $GITHUB_OUTPUT
          fi

          # Python detection
          pyreq=$(find . -type f -name 'requirements.txt' -not -path "./.git/*" -print -quit || true)
          pyproj=$(find . -type f -name 'pyproject.toml' -not -path "./.git/*" -print -quit || true)
          if [ -n "$pyreq" ] || [ -n "$pyproj" ]; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          fi

          # web/ special-case
          if [ -d "web" ] || [ -f "web/package.json" ]; then
            echo "has_web=true" >> $GITHUB_OUTPUT
            if [ -z "${pkg_json:-}" ]; then
              echo "node_dir=web" >> $GITHUB_OUTPUT
            fi
          fi

          # Go modules (collect all go.mod paths)
          mapfile -t mods < <(find . -type f -name 'go.mod' -not -path "./.git/*" -print || true)
          if [ "${#mods[@]}" -gt 0 ]; then
            echo "has_go=true" >> $GITHUB_OUTPUT
            dirs=""
            json="["
            first=true
            any_sum=false
            for m in "${mods[@]}"; do
              d=$(dirname "$m")
              d="${d#./}"
              if [ -z "$d" ]; then d="."; fi
              dirs="${dirs} ${d}"
              if [ "$first" = true ]; then
                json="${json}\"${d}\""
                first=false
              else
                json="${json},\"${d}\""
              fi
              if [ -f "${d}/go.sum" ] || ( [ "$d" = "." ] && [ -f "go.sum" ] ); then
                any_sum=true
              fi
            done
            json="${json}]"
            dirs="${dirs#"${dirs%%[! ]*}"}"
            echo "go_mod_paths=$dirs" >> $GITHUB_OUTPUT
            echo "go_mod_paths_json=$json" >> $GITHUB_OUTPUT
            if [ "$any_sum" = true ]; then
              echo "has_go_sum=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-go:
    name: Build & Test Go
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_go == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git to access private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/Aurionex/*

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install jq (if needed) and build modules + explicit cmd binaries
        run: |
          set -euo pipefail
          printf '%s' "${{ needs.setup.outputs.go_mod_paths_json }}" > /tmp/go_mods.json
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi

          # ---------------------------
          # CRITICAL NEW STEP: create & run a production-grade fixer in-place (AST-based)
          # This step is executed BEFORE any go mod tidy / go build for modules.
          # It is created at runtime (no manual uploading needed).
          # ---------------------------
          echo "[*] Creating runtime import-fixer tool (tools/fiximports.go)..."
          mkdir -p tools

          cat > tools/fiximports.go <<'EOF'
package main

// Runtime-created fiximports.go — production-grade AST-based import fixer.
// Features:
// - Uses go/parser & go/ast & golang.org/x/tools/imports & golang.org/x/mod/modfile
// - Detects module name per file by finding nearest go.mod (supports monorepos with multiple modules)
// - Rewrites short local imports + internal/... + old repo token -> canonical module/full path
// - Keeps alias imports intact, preserves comments/strings
// - After AST changes, runs imports.Process to reorder/remove unused/merge duplicates
// - Checks local filesystem for referenced local packages and warns if missing
// - Attempts `go get <import>` for external imports added if necessary, then runs `go mod tidy`
// - Prints concise summary. Does NOT git-commit or push.
//
// Limitations:
// - For external modules, `go get` may fail (network, private repo) — such failures are printed.
// - For very complex/workspace-specific layouts you may want to extend logic per repo.

import (
	"bytes"
	"fmt"
	"go/ast"
	"go/parser"
	"go/printer"
	"go/token"
	"io/fs"
	"io/ioutil"
	"os"
	"os/exec"
	"path/filepath"
	"strings"

	"golang.org/x/mod/modfile"
	"golang.org/x/tools/imports"
)

const fallbackModuleName = "github.com/Aurionex/NebulaCore"
const oldRepoToken = "konrotaharai-netizen"

type modInfo struct {
	ModPath string // module path, e.g. github.com/owner/repo
	Dir     string // directory where go.mod resides
}

func main() {
	stdSet := detectStdPackages()

	changedFiles := 0
	warnings := 0

	err := filepath.WalkDir(".", func(path string, d fs.DirEntry, err error) error {
		if err != nil {
			return nil
		}
		// skip irrelevant dirs
		if d.IsDir() {
			base := filepath.Base(path)
			if base == ".git" || base == "vendor" || base == "node_modules" {
				return filepath.SkipDir
			}
			return nil
		}
		if !strings.HasSuffix(path, ".go") {
			return nil
		}
		// process
		changed, warn, err := processFile(path, stdSet)
		if err != nil {
			fmt.Fprintf(os.Stderr, "[fiximports] error %s: %v\n", path, err)
			return nil
		}
		if changed {
			changedFiles++
		}
		warnings += warn
		return nil
	})
	if err != nil {
		fmt.Fprintf(os.Stderr, "walk error: %v\n", err)
	}

	// After file changes, run a repo-wide go mod tidy to ensure go.mod updated for external deps
	fmt.Println("[fiximports] Running `go mod tidy` (repo root) to update modules...")
	if out, err := exec.Command("bash", "-lc", "go mod tidy").CombinedOutput(); err != nil {
		fmt.Fprintf(os.Stderr, "[fiximports] go mod tidy failed: %v\n%s\n", err, string(out))
	} else {
		fmt.Println("[fiximports] go mod tidy completed.")
	}

	fmt.Printf("[fiximports] Summary: files_changed=%d warnings=%d\n", changedFiles, warnings)
}

// detectStdPackages uses 'go list std' for a robust stdlib set.
func detectStdPackages() map[string]bool {
	out, err := execCommandSilent("go list std")
	if err != nil {
		// fallback minimal set
		return map[string]bool{"fmt": true, "io": true, "os": true, "net/http": true}
	}
	m := map[string]bool{}
	for _, l := range strings.Split(strings.TrimSpace(string(out)), "\n") {
		if l != "" {
			m[l] = true
		}
	}
	return m
}

// processFile parses file, rewrites imports using nearest module context, runs imports.Process and writes file if changed.
func processFile(path string, stdSet map[string]bool) (changed bool, warnings int, err error) {
	origBytes, err := ioutil.ReadFile(path)
	if err != nil {
		return false, 0, err
	}

	fset := token.NewFileSet()
	fileAst, err := parser.ParseFile(fset, path, origBytes, parser.ParseComments)
	if err != nil {
		return false, 0, fmt.Errorf("parse error: %w", err)
	}

	changed = false
	warnings = 0

	// Precompute module info (nearest go.mod) for this file
	mod, err := findNearestModule(filepath.Dir(path))
	if err != nil {
		// no go.mod found — will fallback to fallbackModuleName with repo root assumption
		mod = &modInfo{ModPath: fallbackModuleName, Dir: "."}
	}

	for _, imp := range fileAst.Imports {
		old := strings.Trim(imp.Path.Value, `"`)

		// preserve alias name (imp.Name) — don't modify alias identifiers

		// skip stdlib
		if stdSet[old] {
			continue
		}

		// determine if external (has a dot before first slash)
		firstSlash := strings.Index(old, "/")
		firstDot := strings.Index(old, ".")
		isExternal := (firstDot != -1 && (firstSlash == -1 || firstDot < firstSlash))

		// internal/ -> module/internal/...
		if strings.HasPrefix(old, "internal/") {
			newPath := mod.ModPath + "/" + old
			if old != newPath {
				imp.Path.Value = `"` + newPath + `"`
				changed = true
			}
			// check existence relative to mod.Dir
			if !checkLocalExistenceInModule(mod, strings.TrimPrefix(old, "internal/")) && !checkLocalExistenceInModule(mod, old) {
				fmt.Printf("[fiximports] Warning: file=%s import=%s -> %s : local folder not found under module dir %s\n", path, old, newPath, mod.Dir)
				warnings++
			}
			continue
		}

		// old repo token replacement
		if strings.Contains(old, oldRepoToken) {
			newPath := strings.Replace(old, oldRepoToken, mod.ModPath, 1)
			if old != newPath {
				imp.Path.Value = `"` + newPath + `"`
				changed = true
			}
			// check if local under module
			if strings.HasPrefix(newPath, mod.ModPath+"/") {
				suffix := strings.TrimPrefix(newPath, mod.ModPath+"/")
				if !checkLocalExistenceInModule(mod, suffix) {
					fmt.Printf("[fiximports] Warning: file=%s import=%s -> %s : not found in module dir %s\n", path, old, newPath, mod.Dir)
					warnings++
				}
			}
			continue
		}

		// already using module path for this module
		if strings.HasPrefix(old, mod.ModPath+"/") {
			suffix := strings.TrimPrefix(old, mod.ModPath+"/")
			if !checkLocalExistenceInModule(mod, suffix) {
				fmt.Printf("[fiximports] Warning: file=%s import=%s : module-local path not found in %s\n", path, old, mod.Dir)
				warnings++
			}
			continue
		}

		// if external, skip (we assume go mod will handle external modules)
		if isExternal {
			// but ensure that go.mod has this requirement — we attempt go get later if missing
			continue
		}

		// Short local import (no slash or no domain) — interpret as module-local package and rewrite
		newPath := mod.ModPath + "/" + old
		if old != newPath {
			imp.Path.Value = `"` + newPath + `"`
			changed = true
		}
		// check local existence in module dir
		if !checkLocalExistenceInModule(mod, old) && !checkLocalExistenceInModule(mod, strings.TrimPrefix(newPath, mod.ModPath+"/")) {
			fmt.Printf("[fiximports] Warning: file=%s converted import %s -> %s but folder not found under module dir %s\n", path, old, newPath, mod.Dir)
			warnings++
		}
	}

	// if changed (AST), print -> run imports.Process and write file
	var finalBytes []byte
	if changed {
		var buf bytes.Buffer
		if err := printer.Fprint(&buf, fset, fileAst); err != nil {
			return true, warnings, fmt.Errorf("printer failed: %w", err)
		}
		processed, err := imports.Process(path, buf.Bytes(), &imports.Options{
			Comments:  true,
			TabIndent: true,
			TabWidth:  8,
		})
		if err != nil {
			// fallback: write AST-only
			if err2 := ioutil.WriteFile(path, buf.Bytes(), 0644); err2 != nil {
				return true, warnings, fmt.Errorf("imports.Process failed (%v) and write fallback also failed: %w", err, err2)
			}
			fmt.Printf("[fiximports] imports.Process failed for %s: %v — wrote AST-only output\n", path, err)
			return true, warnings, nil
		}
		finalBytes = processed
	} else {
		// no AST change; still try to run imports.Process to clean and reorder
		processed, err := imports.Process(path, origBytes, &imports.Options{
			Comments:  true,
			TabIndent: true,
			TabWidth:  8,
		})
		if err == nil && !bytes.Equal(processed, origBytes) {
			finalBytes = processed
			changed = true
		} else {
			return false, warnings, nil
		}
	}

	if finalBytes != nil {
		if err := ioutil.WriteFile(path, finalBytes, 0644); err != nil {
			return changed, warnings, fmt.Errorf("write failed: %w", err)
		}
		fmt.Printf("[fiximports] updated -> %s\n", path)
	}

	return changed, warnings, nil
}

// findNearestModule walks upward from dir to find go.mod and parse module path.
// returns nil error if not found (returns fallback handled by caller).
func findNearestModule(dir string) (*modInfo, error) {
	cur := dir
	for {
		modf := filepath.Join(cur, "go.mod")
		if _, err := os.Stat(modf); err == nil {
			b, err := ioutil.ReadFile(modf)
			if err != nil {
				return nil, err
			}
			parsed, err := modfile.Parse(modf, b, nil)
			if err == nil && parsed.Module != nil && parsed.Module.Mod.Path != "" {
				return &modInfo{ModPath: parsed.Module.Mod.Path, Dir: cur}, nil
			}
			// if parse failed, still return fallback
			return &modInfo{ModPath: fallbackModuleName, Dir: cur}, nil
		}
		parent := filepath.Dir(cur)
		if parent == cur {
			// reached filesystem root
			break
		}
		cur = parent
	}
	return nil, fmt.Errorf("no go.mod found upward from %s", dir)
}

// checkLocalExistenceInModule checks whether relative package path exists under module dir.
func checkLocalExistenceInModule(mod *modInfo, rel string) bool {
	clean := filepath.Clean(rel)
	candidate := filepath.Join(mod.Dir, clean)
	if info, err := os.Stat(candidate); err == nil && info.IsDir() {
		return true
	}
	// try package folder variant
	if info, err := os.Stat(candidate + "/"); err == nil && info.IsDir() {
		return true
	}
	// check for package files (folder may be nested)
	if files, err := filepath.Glob(filepath.Join(mod.Dir, clean, "*.go")); err == nil && len(files) > 0 {
		return true
	}
	return false
}

// execCommandSilent runs command and returns output or error.
func execCommandSilent(cmdline string) ([]byte, error) {
	c := exec.Command("bash", "-lc", cmdline)
	return c.CombinedOutput()
}
EOF

          echo "[*] Running the import-fixer..."
          # run fixer (go will download x/tools & x/mod if needed)
          GOFLAGS="" go run ./tools/fiximports.go || echo "[!] fiximports.go exited with errors (check logs)"

          echo "[*] Finished import-fixer. Now running go mod tidy to update modules if needed..."
          go mod tidy || echo "[!] go mod tidy encountered errors (check logs)"
          # ---------------------------
          # End runtime-created fixer
          # ---------------------------
          
          # convert json array to bash array
          mapfile -t mods < <(jq -r '.[]' /tmp/go_mods.json 2>/dev/null || true)
          if [ "${#mods[@]}" -eq 0 ]; then
            mods=(".")
          fi

          echo "Detected Go modules: ${mods[*]}"
          for d in "${mods[@]}"; do
            if [ -z "$d" ] || [ "$d" = "." ]; then d="."; fi
            echo ">>> Processing Go module: '$d'"
            cd "$d"
            # ensure dependencies are tidy and available
            go mod tidy
            go mod download
            # run tests
            go test ./... -v

            # Build each cmd sub-binary explicitly (preferred for CodeQL and clear logs)
            if [ -d "cmd" ]; then
              echo "Found cmd/ directory; building each sub-binary separately..."
              mkdir -p ./build/bin
              for binpath in cmd/*; do
                if [ -d "$binpath" ]; then
                  name=$(basename "$binpath")
                  # ensure at least one .go file exists (and typically package main)
                  if compgen -G "$binpath/*.go" > /dev/null; then
                    echo "Building binary: $name (module: $d)"
                    # output per-module to avoid collisions
                    out="./build/bin/${d//\//_}-${name}"
                    go build -v -o "$out" ./cmd/"$name"
                    echo "-> wrote $out"
                  fi
                fi
              done
            else
              echo "No cmd/ found; falling back to module-wide build"
              go build ./...
            fi

            cd - >/dev/null
          done

  lint-python:
    name: Lint & Security (Python)
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_python == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Lint & Bandit
        run: |
          set -euo pipefail
          pip install --upgrade pip
          pip install flake8 bandit || true
          flake8 .
          bandit -r .

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_node == 'true' || needs.setup.outputs.has_web == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (with cache)
        if: ${{ needs.setup.outputs.pkg_lock != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          # pass explicit path to lockfile inside detected node_dir (improves caching when frontend is in subfolder)
          cache-dependency-path: ${{ needs.setup.outputs.node_dir }}/package-lock.json

      - name: Setup Node (no cache)
        if: ${{ needs.setup.outputs.pkg_lock == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend deps and build (uses detected node_dir)
        run: |
          set -euo pipefail
          dir="${{ needs.setup.outputs.node_dir }}"
          if [ -z "$dir" ] || [ "$dir" = "." ]; then dir="."; fi
          echo "Using frontend dir: $dir"
          cd "$dir"
          if [ -f package-lock.json ] || [ -f yarn.lock ] || [ -f npm-shrinkwrap.json ]; then
            echo "Running install with lockfile present"
            npm ci --no-audit --no-fund
          else
            echo "Running install without lockfile"
            npm install --no-audit --no-fund
          fi
          npm run build --if-present
          echo "Running tests if available..."
          npm test --if-present || echo "No tests found."

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "go, python, javascript"

      - name: Prepare Go build for CodeQL (explicit per-cmd build)
        if: ${{ needs.setup.outputs.has_go == 'true' }}
        run: |
          set -euo pipefail
          printf '%s' "${{ needs.setup.outputs.go_mod_paths_json }}" > /tmp/go_mods.json
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi
          mapfile -t mods < <(jq -r '.[]' /tmp/go_mods.json 2>/dev/null || true)
          if [ "${#mods[@]}" -eq 0 ]; then
            mods=(".")
          fi
          echo "Preparing CodeQL build for modules: ${mods[*]}"
          for d in "${mods[@]}"; do
            if [ -z "$d" ] || [ "$d" = "." ]; then d="."; fi
            echo "-> $d"
            cd "$d"
            # show environment for debugging CodeQL builds
            go env

            # ensure tidy + download (CodeQL benefits from deterministic vendor/cache)
            go mod tidy
            go mod download

            # run tests (some projects need tests to prepare generated code)
            go test ./... -v || echo "Some tests failed but continuing CodeQL prep"

            # Build cmd/* binaries explicitly (same logic as build-go)
            if [ -d "cmd" ]; then
              mkdir -p ./codeql_build/bin
              for binpath in cmd/*; do
                if [ -d "$binpath" ]; then
                  name=$(basename "$binpath")
                  if compgen -G "$binpath/*.go" > /dev/null; then
                    out="./codeql_build/bin/${d//\//_}-${name}"
                    echo "CodeQL build: $out"
                    go build -v -o "$out" ./cmd/"$name"
                    echo "-> $out"
                  fi
                fi
              done
            else
              # fallback: module-wide build
              go build ./...
            fi

            cd - >/dev/null
          done

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          upload: "false"   # 🚫 إيقاف رفع نتائج التحليل (لن يرسلها إلى GitHub Security)

  summary:
    name: Summary Report
    runs-on: ubuntu-latest
    needs: setup
    if: always()
    steps:
      - name: Print basic CI summary
        run: |
          echo "✅ CI completed (or finished with logs) for $GITHUB_REPOSITORY"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Detected: has_go=${{ needs.setup.outputs.has_go }}, has_go_sum=${{ needs.setup.outputs.has_go_sum }}, has_node=${{ needs.setup.outputs.has_node }}, node_dir=${{ needs.setup.outputs.node_dir }}, pkg_lock=${{ needs.setup.outputs.pkg_lock }}"
      - name: Upload summary to GitHub Steps Summary
        run: |
          echo "### ✅ CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Go detected: ${{ needs.setup.outputs.has_go }}" >> $GITHUB_STEP_SUMMARY
          echo "- Go sum present: ${{ needs.setup.outputs.has_go_sum }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node detected: ${{ needs.setup.outputs.has_node }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node dir: ${{ needs.setup.outputs.node_dir }}" >> $GITHUB_STEP_SUMMARY
          echo "- Package lock path: ${{ needs.setup.outputs.pkg_lock }}" >> $GITHUB_STEP_SUMMARY
          
