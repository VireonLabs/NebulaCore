name: NebulaCore Auto-Fix (quic-go import path)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - develop
      - fix/*
      - hotfix/*

permissions:
  contents: write

jobs:
  fix-quic-import:
    name: Auto-fix deprecated quic-go import path
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect & fix deprecated import path
        run: |
          echo "🔍 Searching for old quic-go import path..."
          FOUND=$(grep -R "github.com/lucas-clemente/quic-go" . || true)
          if [ -n "$FOUND" ]; then
            echo "⚙️ Found old import path — applying replacements..."
            grep -Rl "github.com/lucas-clemente/quic-go" . | \
              xargs sed -i 's#github.com/lucas-clemente/quic-go#github.com/quic-go/quic-go#g'
          else
            echo "✅ No deprecated import paths found."
          fi

      - name: Remove old go.sum if exists
        run: |
          if [ -f go.sum ]; then
            echo "🧹 Removing outdated go.sum..."
            rm -f go.sum
          else
            echo "✅ No go.sum file to remove."
          fi

      - name: Commit & push updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci(fix): updated deprecated quic-go import path"
          branch: ${{ github.ref_name }}
          author_name: "nebula-ci-bot"
          author_email: "nebula-ci-bot@users.noreply.github.com"
          commit_user_email: nebula-ci-bot@users.noreply.github.com
