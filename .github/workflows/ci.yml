name: NebulaCore CI (Clean & Stable)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.20"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  setup:
    name: Detect Project Layout
    runs-on: ubuntu-latest
    outputs:
      has_go: ${{ steps.detect.outputs.has_go }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_web: ${{ steps.detect.outputs.has_web }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          echo "has_go=false" >> $GITHUB_OUTPUT
          echo "has_python=false" >> $GITHUB_OUTPUT
          echo "has_node=false" >> $GITHUB_OUTPUT
          echo "has_web=false" >> $GITHUB_OUTPUT

          if [ -f "go.mod" ]; then echo "has_go=true" >> $GITHUB_OUTPUT; fi
          if [ -f "requirements.txt" ]; then echo "has_python=true" >> $GITHUB_OUTPUT; fi
          if [ -f "package.json" ]; then echo "has_node=true" >> $GITHUB_OUTPUT; fi
          if [ -d "web" ]; then echo "has_web=true" >> $GITHUB_OUTPUT; fi

  build-go:
    name: Build & Test Go
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_go == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: |
          go mod tidy || true
          go test ./... -v

  lint-python:
    name: Lint & Security (Python)
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_python == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install flake8 bandit || true
          flake8 . || true
          bandit -r . || true

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.has_node == 'true' || needs.setup.outputs.has_web == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci || npm install
          npm run build --if-present
          npm test --if-present

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          # تم تعديل الصيغة إلى scalar ليتوافق مع بعض مدققات YAML الصارمة
          languages: "go, python, javascript"
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  summary:
    name: Summary Report
    runs-on: ubuntu-latest
    # نريدها تعمل دائماً لتجميع النتائج حتى لو بعض الوظائف لم تُنفَّذ
    if: always()
    steps:
      - run: |
          echo "✅ CI completed (or finished with logs) for $GITHUB_REPOSITORY"
          echo "Run ID: $GITHUB_RUN_ID"
