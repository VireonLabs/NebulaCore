version: "3.8"
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD: nebula_pass
      POSTGRES_DB: nebula
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

  vault:
    image: vault:1.14
    restart: always
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: "server -dev -dev-root-token-id=root-token"
    ports:
      - "8200:8200"

  ai-model:
    build:
      context: ai/models/mistral-7b
      dockerfile: Dockerfile.ai
    environment:
      HF_TOKEN: "${HF_TOKEN}"
    ports:
      - "6006:6006"

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control
    environment:
      NEB_DB_DSN: "host=postgres user=nebula password=nebula_pass dbname=nebula sslmode=disable"
      NEB_REDIS_ADDR: "redis:6379"
      NEB_VAULT_ADDR: "http://vault:8200"
      NEB_VAULT_TOKEN: "root-token"
      AI_ENDPOINT: "http://ai-model:6006/v1/chat"
      NEB_HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - vault
      - ai-model

  agent-local:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      CONTROL_URL: "http://control-plane:8080"
      AGENT_PORT: "9000"
      SANDBOX_TYPE: "docker"
    ports:
      - "9000:9000"
    depends_on:
      - control-plane

volumes:
  pgdata: